<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menü</title>

<style>

body{
margin:0;
background:black;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* MENÜ EKRANI */

#menuScreen{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:10;
}

#menuBtn{
padding:18px 50px;
font-size:22px;
background:#d4af37;
border:none;
border-radius:30px;
cursor:pointer;
}

/* SLIDER */

#slider{
display:none;
width:100%;
height:100vh;
position:fixed;
top:0;
left:0;
}

/* GÖRSEL */

.slide{
width:100%;
height:100%;
object-fit:contain;
position:absolute;
top:0;
left:0;
display:none;
}

.slide.active{
display:block;
}

</style>
</head>

<body>

<!-- MENÜ -->
<div id="menuScreen">
<button id="menuBtn">MENÜ</button>
</div>

<!-- SLIDER -->

<div id="slider">

<img src="images/1.jpg" class="slide">
<img src="images/2.jpg" class="slide">
<img src="images/3.jpg" class="slide">
<img src="images/4.jpg" class="slide">
<img src="images/5.jpg" class="slide">
<img src="images/6.jpg" class="slide">

</div>

<script>

const menuBtn = document.getElementById("menuBtn")
const menuScreen = document.getElementById("menuScreen")
const slider = document.getElementById("slider")
const slides = document.querySelectorAll(".slide")

let current = 0

function showSlide(index){

if(index < 0) index = 0
if(index > slides.length - 1) index = slides.length - 1

slides.forEach(s => s.classList.remove("active"))

slides[index].classList.add("active")

current = index

}

/* MENÜ BUTONU */

menuBtn.onclick = () => {

menuScreen.style.display = "none"
slider.style.display = "block"

showSlide(0)

}

/* TIKLAMA */

slider.addEventListener("click",(e)=>{

const width = window.innerWidth
const x = e.clientX

if(x > width/2){

showSlide(current + 1)

}else{

showSlide(current - 1)

}

})

</script>

</body>
</html>
