<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menü</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

/* MENÜ EKRANI */

#menuScreen{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#menuBtn{
padding:18px 45px;
font-size:22px;
background:#d4af37;
border:none;
border-radius:30px;
cursor:pointer;
}

/* SLIDER */

#slider{
display:none;
position:absolute;
width:100%;
height:100vh;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.slide.active{
display:block;
}

</style>
</head>

<body>

<!-- MENÜ -->
<div id="menuScreen">
<button id="menuBtn">MENÜ</button>
</div>

<!-- SLIDER -->
<div id="slider">

<img src="images/1.jpg" class="slide active">
<img src="images/2.jpg" class="slide">
<img src="images/3.jpg" class="slide">
<img src="images/4.jpg" class="slide">
<img src="images/5.jpg" class="slide">
<img src="images/6.jpg" class="slide">

</div>

<script>

const menuBtn = document.getElementById("menuBtn")
const menuScreen = document.getElementById("menuScreen")
const slider = document.getElementById("slider")

const slides = document.querySelectorAll(".slide")

let current = 0

menuBtn.onclick = () => {

menuScreen.style.display="none"
slider.style.display="block"

}

function showSlide(index){

slides[current].classList.remove("active")

current = index

if(current < 0) current = slides.length - 1
if(current >= slides.length) current = 0

slides[current].classList.add("active")

}

document.addEventListener("click",(e)=>{

if(slider.style.display !== "block") return

const x = e.clientX
const width = window.innerWidth

if(x > width/2){

showSlide(current + 1)

}else{

showSlide(current - 1)

}

})

</script>

</body>
</html>
