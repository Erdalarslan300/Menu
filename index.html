<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Menü</title>
<style>
body{
    margin:0;
    background:black;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}
#menuBtn{
    padding:20px 40px;
    font-size:28px;
    border:none;
    border-radius:12px;
    background:white;
    color:black;
    cursor:pointer;
}
#gallery{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
}
#gallery img{
    max-width:100vw;
    max-height:100vh;
    object-fit:contain;
}
.clickZone{
    position:absolute;
    top:0;
    height:100%;
    width:50%;
}
#leftZone{ left:0; }
#rightZone{ right:0; }
</style>
</head>
<body>

<button id="menuBtn">MENÜ</button>

<div id="gallery">
    <div id="leftZone" class="clickZone"></div>
    <img id="menuImage" src="1.jpg">
    <div id="rightZone" class="clickZone"></div>
</div>

<script>
const images=[
"1.jpg",
"2.jpg",
"3.jpg",
"4.jpg",
"5.jpg",
"6.jpg"
];

let index=0;

const btn=document.getElementById("menuBtn");
const gallery=document.getElementById("gallery");
const img=document.getElementById("menuImage");

btn.onclick=()=>{
    btn.style.display="none";
    gallery.style.display="flex";
    index=0;
    img.src=images[index];
};

document.getElementById("rightZone").onclick=()=>{
    if(index<images.length-1){
        index++;
        img.src=images[index];
    }
};

document.getElementById("leftZone").onclick=()=>{
    if(index>0){
        index--;
        img.src=images[index];
    }
};
</script>

</body>
</html>
